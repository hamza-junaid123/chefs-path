<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef's Path — Learn to Cook, Step by Step</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#/learn" class="brand" aria-label="Chef's Path home">
        <span class="brand-icon">🍳</span>
        <span class="brand-name">Chef's Path</span>
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="#/learn" data-nav="learn" data-i18n="nav_learn">Learn</a>
        <a href="#/progress" data-nav="progress" data-i18n="nav_progress">Progress</a>
        <a href="#/recipes" data-nav="recipes" data-i18n="nav_recipes">Recipes</a>
        <a href="#/timer" data-nav="timer" data-i18n="nav_timer">Timer</a>
      </nav>
      <div class="header-actions">
        <a href="#/timer" id="timer-chip" class="timer-chip" hidden>⏱ <span id="timer-chip-time"></span></a>
        <button id="theme-toggle" class="icon-btn" title="Toggle dark / light theme" aria-label="Toggle theme">🌙</button>
        <a href="#/settings" class="icon-btn" data-nav="settings" title="Settings" aria-label="Settings">⚙️</a>
      </div>
    </div>
  </header>

  <main id="app" class="app-main" tabindex="-1">
    <!-- Views are rendered here by js/app.js -->
    <noscript>
      <div class="card" style="margin:2rem auto; max-width:40rem; padding:1.5rem;">
        <h2>JavaScript required</h2>
        <p>Chef's Path needs JavaScript to track your progress. Please enable it and reload the page.</p>
      </div>
    </noscript>
  </main>

  <footer class="site-footer">
    <p id="footer-text">Chef's Path — from first chop to full menu. Your progress is saved on this device.</p>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/pics.js"></script>
  <script src="js/content.js"></script>
  <!-- Lesson-content translations (each registers into window.CONTENT_I18N) -->
  <script src="js/lang/es.js"></script>
  <script src="js/lang/fr.js"></script>
  <script src="js/lang/ur.js"></script>
  <script src="js/lang/hi.js"></script>
  <script src="js/lang/ar.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/game.js"></script>
  <script src="js/assistant.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
